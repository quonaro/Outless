services:
  postgres:
    image: postgres:16-alpine
    container_name: outless-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: outless
      POSTGRES_USER: outless
      POSTGRES_PASSWORD: outless
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./migrations/002_add_admins.sql:/docker-entrypoint-initdb.d/002_add_admins.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U outless -d outless" ]
      interval: 5s
      timeout: 3s
      retries: 20

  probe-manager:
    build:
      context: .
      dockerfile: Dockerfile
      target: probe-manager
    container_name: outless-probe-manager
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./outless.docker.local.yaml:/app/outless.yaml:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./xray:/app/xray:ro
    command: [ "-config", "/app/outless.yaml" ]

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: outless-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      probe-manager:
        condition: service_started
    ports:
      - "41220:41220"
    volumes:
      - ./outless.docker.local.yaml:/app/outless.yaml:rw
      - outless_tmp:/app/tmp
    command: [ "-config", "/app/outless.yaml" ]

  hub:
    build:
      context: .
      dockerfile: Dockerfile
      target: hub
    container_name: outless-hub
    user: "0:0"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./outless.yaml:/app/outless.yaml:rw
      - outless_runtime:/var/lib/outless
    command: [ "-config", "/app/outless.yaml" ]

  checker:
    build:
      context: .
      dockerfile: Dockerfile
      target: checker
    container_name: outless-checker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      probe-manager:
        condition: service_started
    volumes:
      - ./outless.docker.local.yaml:/app/outless.yaml:rw
      - outless_tmp:/app/tmp
    command: [ "-config", "/app/outless.yaml" ]

  xray-edge:
    image: ghcr.io/xtls/xray-core:latest
    restart: unless-stopped
    container_name: outless-xray-edge
    user: "0:0"
    depends_on:
      hub:
        condition: service_started
    ports:
      - "443:443"
    expose:
      - "10086"
      - "1081"
    volumes:
      - outless_runtime:/var/lib/outless
    command: [ "run", "-config", "/var/lib/outless/xray-hub.json" ]

volumes:
  postgres_data:
    name: outless-db
  outless_runtime:
    name: outless-runtime
  outless_tmp:
    name: outless-tmp
