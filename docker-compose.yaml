services:
  postgres:
    image: postgres:16-alpine
    container_name: outless-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-outless}
      POSTGRES_USER: ${POSTGRES_USER:-outless}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-outless}
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./migrations/002_add_admins.sql:/docker-entrypoint-initdb.d/002_add_admins.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U outless -d outless" ]
      interval: 5s
      timeout: 3s
      retries: 20

  probe-manager:
    build:
      context: .
      dockerfile: Dockerfile
      target: probe-manager
    container_name: outless-probe-manager
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    user: "0:0"
    environment:
      XRAY_CONFIG_PATH: /app/xray/config.json
      XRAY_CONFIG_VOLUME: outless-xray-config
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    volumes:
      - ./outless.yaml:/app/outless.yaml:ro
      # SECURITY WARNING: Direct Docker socket mount gives full control over host Docker daemon.
      # For production, consider using docker-socket-proxy (https://github.com/Tecnativa/docker-socket-proxy)
      # to restrict API access to only container management operations.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./xray/config.json:/host-xray-config.json:ro
      - xray_config:/app/xray
    command: [ "-config", "/app/outless.yaml" ]
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f probe-manager || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: outless-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      probe-manager:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    ports:
      - "41220:41220"
    volumes:
      - ./outless.yaml:/app/outless.yaml:rw
      - outless_tmp:/app/tmp
    command: [ "-config", "/app/outless.yaml" ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:41220/v1/stats || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3

  hub:
    build:
      context: .
      dockerfile: Dockerfile
      target: hub
    container_name: outless-hub
    user: "0:0"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    volumes:
      - ./outless.yaml:/app/outless.yaml:rw
      - outless_runtime:/var/lib/outless
    command: [ "-config", "/app/outless.yaml" ]
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f hub || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3

  checker:
    build:
      context: .
      dockerfile: Dockerfile
      target: checker
    container_name: outless-checker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      probe-manager:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    volumes:
      - ./outless.yaml:/app/outless.yaml:rw
      - outless_tmp:/app/tmp
    command: [ "-config", "/app/outless.yaml" ]
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f checker || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3

  xray-edge:
    image: ghcr.io/xtls/xray-core:latest
    restart: unless-stopped
    container_name: outless-xray-edge
    user: "0:0"
    depends_on:
      hub:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    ports:
      - "443:443"
    expose:
      - "10086"
      - "1081"
    volumes:
      - outless_runtime:/var/lib/outless
    command: [ "run", "-config", "/var/lib/outless/xray-hub.json" ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:10086/debug || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    name: outless-db
  outless_runtime:
    name: outless-runtime
  outless_tmp:
    name: outless-tmp
  xray_config:
    name: outless-xray-config
