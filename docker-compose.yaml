services:
  database:
    image: postgres:16-alpine
    container_name: outless-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: outless
      POSTGRES_USER: outless
      POSTGRES_PASSWORD: outless
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U outless -d outless" ]
      interval: 5s
      timeout: 5s
      retries: 10

  xray:
    image: ghcr.io/xtls/xray-core:latest
    container_name: outless-xray
    restart: unless-stopped
    volumes:
      - ./xray/config.json:/etc/xray/config.json:ro
      - /var/log/outless:/var/log/outless
    command: [ "run", "-config", "/etc/xray/config.json" ]
    ports:
      - "443:443"

  outless:
    container_name: outless
    build:
      context: .
      dockerfile: Dockerfile
      target: outless
    restart: unless-stopped
    depends_on:
      - database
      - xray
    ports:
      - "41220:41220"
    volumes:
      - ./outless.yaml:/app/outless.yaml
      - /var/log/outless:/var/log/outless
    command: [ "-config", "/app/outless.yaml" ]

volumes:
  postgres_data:
    name: outless-db
