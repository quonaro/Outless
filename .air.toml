root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/api ./cmd/api"
bin = "./tmp/api"
full_bin = "./tmp/api -config outless.yaml"
include_ext = ["go", "yaml", "yml"]
exclude_dir = ["tmp", "vendor", ".git", ".idea"]
exclude_regex = ["_test\\.go"]
delay = 300
stop_on_error = true
send_interrupt = true
kill_delay = "1s"

[log]
time = true

[screen]
clear_on_rebuild = false
