    socks_addr: "xray-probe:1080"
    geoip_db_path: "/app/tmp/GeoLite2-Country.mmdb"
    geoip_db_url: "https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-Country.mmdb"
    geoip_auto: false
    geoip_ttl: "24h"

hub:
  host: "localhost"
  port: 443
  sni: "www.google.com"
  public_key: "C9_cqLdlKo4qZ-3PKDoOelm-u3pSzJhuuYSeChVyWBQ"
  private_key: "wHzJBcabwsRZmq-MQDHKlIcKvZ1-uTuyWp6pQYwNtXY"
